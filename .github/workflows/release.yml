name: Package release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python3 scripts/validate_skill.py
      - name: Build installable archive
        run: cd skills && zip -r ../ship-side-projects-${GITHUB_REF_NAME}.zip ship-side-projects
      - uses: softprops/action-gh-release@v2
        with:
          files: ship-side-projects-${{ github.ref_name }}.zip
          generate_release_notes: true

