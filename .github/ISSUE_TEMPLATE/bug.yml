name: Bug report
description: Report incorrect, unsafe, or inconsistent skill behavior
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What behavior did you observe, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: prompt
    attributes:
      label: Reproduction prompt and context
      description: Remove secrets, private data, and confidential project material.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Explain the practical consequence or risk.
    validations:
      required: true

